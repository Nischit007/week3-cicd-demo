name : Deploying Assignment week 3

on:
    push: 
        branches:
            - "*"
    pull_request:
        branches:
            - main
    workflow_dispatch:

env :
    APP_ENV=${{secrets.APP_ENV}}

jobs:
    build-and-test:
        runs-on: ubuntu-latest  

        strategy:
            fail-fast: false
            matrix:
                python-version: ['3.10','3.11','3.12']

        steps:
            - name: Print env variable
              run: echo "$APP_ENV"

            - name: checkout git repo
              uses: actions/checkout@v4


            - name: setup-python
              uses: actions/setup-python@v5
              with :
                python-version: ${{matrix.node-version }}

            - name: Cache pip dependencies
              uses: actions/cache@v4
              with:
                path: ~/.cache/pip
                key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
                restore-keys: |
                    ${{ runner.os }}-pip-

            - name: build and test app.sh
              run: ./app.sh

            - name: build and test test.sh
              run : ./test.sh

            - name: Upload artifact (app-result)
              uses: actions/upload-artifact@v4
              with:
                    name: app.sh-result
                    path: app.sh





        