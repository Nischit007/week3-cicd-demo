name: CD workflow

on:
  push:
    branches: 
      - main

  workflow_dispatch:
    inputs:
      enviornment:
        description: "Deployment Enviornment"
        required: true
        default: stagging
        type: choice
        options:
          - production
          - stagging

env:
  APP_ENV: ${{secrets.APP_ENV}}


jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
        fail-fast: false
        matrix:
            python-version: ['3.10','3.11','3.12']

    steps:
      - name: Checkout git repo
        uses: actions/checkout@v4

      - name: Setup python
        uses: actions/setup-python@v5
        with:
          python-version: ${{matrix.python-version}}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/*') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Print app env
        run: echo "APP_ENV is ${APP_ENV}"

      - name: Install dependencies
        run: python -m pip install --upgrade pip

      - name: Providing permission to app and tesh
        run : chmod +x test.sh app.sh 

      - name: Run app.sh
        run: ./app.sh

      - name: Run test.sh
        run: ./test.sh
        
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-result
          path: .

  deploy:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    environment:
      name: stagging

    steps:
      - name: Deployment Info
        run: | 
          echo "Deploying application..."
          echo "Commit SHA: $GITHUB_SHA"
          echo "Actor: $GITHUB_ACTOR"
          echo "Timestamp: $(date)"

    